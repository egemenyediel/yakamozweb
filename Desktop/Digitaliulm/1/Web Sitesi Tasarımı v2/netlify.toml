[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Immutable assets (versioned by Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files: Cache for 1 hour to allow updates
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# JSON files: Cache for 1 hour
[[headers]]
  for = "/content.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"# Prevent caching of API responses (proxied to Render)
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"